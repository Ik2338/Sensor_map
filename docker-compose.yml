version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: sensor_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: sensorpass
      MONGO_INITDB_DATABASE: sensordb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo-init/init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - sensor-network

  backend:
    build: ./backend
    container_name: sensor_backend
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://admin:sensorpass@mongodb:27017/sensordb?authSource=admin
      PORT: 5000
      NODE_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - sensor-network

  mongo-express:
    image: mongo-express:latest
    container_name: sensor_mongo_express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: sensorpass
      ME_CONFIG_MONGODB_URL: mongodb://admin:sensorpass@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
    ports:
      - "8081:8081"
    depends_on:
      - mongodb
    networks:
      - sensor-network

  frontend:
    build: ./frontend
    container_name: sensor_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:5000
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - sensor-network

volumes:
  mongo_data:

networks:
  sensor-network:
    driver: bridge
